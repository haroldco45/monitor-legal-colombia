<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monitor Legal Colombia — VIBRAS POSITIVAS HM</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        :root {
            --gold:#C9A84C; --gold-light:#E2C06A; --gold-dim:#8A6D2F;
            --dark-bg:#0D0D0E; --dark-card:#1A1A1D; --dark-border:#2A2A2F;
            --dark-border-gold:rgba(201,168,76,0.25);
            --text-primary:#F0EAD6; --text-secondary:#9A8F7A; --text-muted:#5A5347;
            --teal:#1D9E75; --teal-dim:rgba(29,158,117,0.15);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--dark-bg);color:var(--text-primary);font-family:'Source Serif 4',serif;line-height:1.7;min-height:100vh}
        .wrap{max-width:860px;margin:0 auto;padding:0 1.5rem 4rem;position:relative;z-index:1}
        
        header{padding:3rem 0 2rem;border-bottom:1px solid var(--dark-border-gold);margin-bottom:2.5rem;text-align:center}
        header h1{font-family:'Playfair Display',serif;font-size:clamp(26px,5vw,40px);color:var(--gold-light);margin-bottom:.4rem}
        header h1 span{color:var(--text-primary);font-weight:400}
        
        .api-box{background:var(--dark-card);border:1px solid var(--dark-border-gold);border-radius:8px;padding:1.2rem;margin-bottom:2rem}
        .api-row{display:flex;gap:8px}
        input, button{border-radius:5px;outline:none}
        input{flex:1;background:var(--dark-bg);border:1px solid var(--dark-border);padding:10px;color:var(--text-primary);font-family:'JetBrains Mono',monospace}
        
        .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem;justify-content:center}
        .pill{padding:6px 14px;font-size:13px;border-radius:20px;border:1px solid var(--dark-border);background:transparent;color:var(--text-secondary);cursor:pointer;transition:.2s}
        .pill.active{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold-light)}

        .btn-q{padding:12px 24px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border:none;font-weight:700;cursor:pointer;font-family:'Playfair Display',serif}
        
        .norm-card{background:var(--dark-card);border:1px solid var(--dark-border);border-radius:8px;padding:1.5rem;margin-bottom:1rem;border-left:4px solid var(--gold-dim)}
        .ct{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold-light);margin-bottom:8px}
        .cs{font-size:0.95rem;color:var(--text-secondary)}
        .err{color:#ff6b6b;background:rgba(255,107,107,0.1);padding:1rem;border-radius:5px;border:1px solid #ff6b6b;font-family:'JetBrains Mono',monospace;font-size:13px}

        footer{margin-top:4rem;text-align:center;border-top:1px solid var(--dark-border-gold);padding-top:2rem}
        .brand-footer{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:3px;color:var(--gold-dim)}
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <h1>Monitor Legal <span>Colombia</span></h1>
        <p>Inteligencia Artificial por VIBRAS POSITIVAS HM</p>
    </header>

    <div class="api-box">
        <label style="font-size:11px; color:var(--gold-dim); display:block; margin-bottom:5px">API KEY DE GOOGLE GEMINI</label>
        <div class="api-row">
            <input type="password" id="apiKey" placeholder="AIzaSy..." />
            <button onclick="buscar()" class="btn-q">CONSULTAR</button>
        </div>
    </div>

    <div class="filters">
        <button class="pill active" onclick="setQ('Leyes y decretos nuevos Colombia 2026', this)">General</button>
        <button class="pill" onclick="setQ('Reforma laboral Colombia 2026', this)">Laboral</button>
        <button class="pill" onclick="setQ('Nuevas resoluciones DIAN 2026', this)">Tributario</button>
    </div>

    <div id="status" style="text-align:center; font-size:13px; margin-bottom:1rem; color:var(--gold)"></div>
    <div id="results"></div>

    <footer>
        <div class="brand-footer">VIBRAS POSITIVAS HM</div>
        <p style="font-size:10px; color:var(--text-muted); margin-top:10px">SISTEMA DE MONITOREO LEGAL AUTOMATIZADO © 2026</p>
    </footer>
</div>

<script>
    let currentQ = 'Leyes y decretos nuevos Colombia 2026';

    function setQ(q, el) {
        currentQ = q;
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
    }

    async function buscar() {
        const key = document.getElementById('apiKey').value.trim(); // .trim() elimina espacios vacíos
        const container = document.getElementById('results');
        const status = document.getElementById('status');
        
        if(!key) {
            alert("Por favor ingresa tu API Key");
            return;
        }

        status.innerHTML = "Consultando base de datos legal...";
        container.innerHTML = "";

        const prompt = `Eres un experto legal colombiano de la firma Vibras Positivas HM. 
        Analiza y lista las normas más recientes sobre: ${currentQ}. 
        Responde en formato JSON puro: {"normas":[{"titulo":"","resumen":"","link":""}]}`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            
            if(data.error) {
                throw new Error(data.error.message);
            }

            const rawText = data.candidates[0].content.parts[0].text;
            const cleanJson = rawText.replace(/```json|```/g, "").trim();
            const parsed = JSON.parse(cleanJson);

            status.innerHTML = "✅ Consulta exitosa";
            parsed.normas.forEach(n => {
                container.innerHTML += `
                    <div class="norm-card">
                        <div class="ct">${n.titulo}</div>
                        <div class="cs">${marked.parse(n.resumen)}</div>
                    </div>
                `;
            });

        } catch (e) {
            status.innerHTML = "";
            container.innerHTML = `<div class="err">⚠ ERROR: ${e.message}<br><br>Tip: Verifica que tu clave no tenga espacios y que tengas cuota disponible en Google AI Studio.</div>`;
        }
    }
</script>
</body>
</html>
